edition: 3.0.0
name: opc-next
access: default

vars:
  region: cn-hangzhou
  registry: registry.cn-hangzhou.aliyuncs.com

resources:
  opc-next:
    component: fc3
    props:
      region: ${vars.region}
      functionName: opc-next
      description: '省心咨询 AI 智能平台'
      runtime: custom-container
      cpu: 1
      memorySize: 2048
      diskSize: 512
      timeout: 60
      instanceConcurrency: 20
      
      customContainerConfig:
        image: '${vars.registry}/${your-namespace}/opc-next:latest'
        port: 3000
        healthCheckUrl: /api/user
      
      environmentVariables:
        NODE_ENV: production
        DASHSCOPE_API_KEY: ${env.DASHSCOPE_API_KEY}
        APP_ID: ${env.APP_ID}
        OSS_ACCESS_KEY_ID: ${env.OSS_ACCESS_KEY_ID}
        OSS_ACCESS_KEY_SECRET: ${env.OSS_ACCESS_KEY_SECRET}
        OSS_REGION: oss-cn-hangzhou
        OSS_BUCKET: follow-ai
        JWT_SECRET: ${env.JWT_SECRET}
        TABLESTORE_ENDPOINT: https://follow-ai.cn-hangzhou.tablestore.aliyuncs.com
        TABLESTORE_INSTANCE_NAME: follow-ai
      
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
      
      instanceLifecycleConfig:
        preFreeze:
          timeout: 5
        preStop:
          timeout: 5
